services:
  web:
    build: ./app
    container_name: so_web
    ports:
      - "3000:3000"
    environment:
      ALUNO: ${ALUNO}
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    mem_limit: 128m          # limite de memória exigido pela infraestrutura
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rede_app
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: so_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    mem_limit: 512m          # MySQL precisa de folga; 128m derruba o serviço
    volumes:
      - db_dados:/var/lib/mysql   # volume persistente dos dados do banco
    networks:
      - rede_app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  rede_app:                  # rede bridge dedicada aos dois serviços
    driver: bridge

volumes:
  db_dados:                  # volume nomeado, sobrevive a remoção do container
